services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo_db}
      POSTGRES_USER: ${POSTGRES_USER:-todo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo_user} -d ${POSTGRES_DB:-todo_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: demos/todo-backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      hyperdx:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-todo_db}
      DB_USER: ${POSTGRES_USER:-todo_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-todo_secret}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min32chars!}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PORT: 3000
      NODE_ENV: production
      OTEL_SERVICE_NAME: todo-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://hyperdx:4318
      OTEL_EXPORTER_OTLP_HEADERS: "authorization=2640d190-d9e3-4dfe-a3fb-b55c958e2445"
      OTEL_LOG_LEVEL: warn
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: demos/todo-frontend/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_API_URL: ""
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    environment:
      URL: http://localhost:${APP_PORT:-3000}/openapi.json
      DISPLAY_OPERATION_ID: "true"
    ports:
      - "${SWAGGER_PORT:-8090}:8080"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@todo.local.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "8110:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

  # HyperDX (ClickStack) — all-in-one OTel collector + ClickHouse + UI.
  # UI:        http://localhost:${HYPERDX_PORT:-8091}
  # OTLP HTTP: http://hyperdx:4318 (in-network) | http://localhost:4318 (host)
  #
  # First-time setup: open the UI, create an admin account, then data flows in.
  hyperdx:
    image: hyperdx/hyperdx-all-in-one:latest
    restart: unless-stopped
    ports:
      - "${HYPERDX_PORT:-8091}:8080"
      - "4317:4317"   # OTLP/gRPC
      - "4318:4318"   # OTLP/HTTP
      - "8123:8123"   # ClickHouse HTTP (debug)
    volumes:
      - hyperdx_data:/data
      - hyperdx_ch_data:/var/lib/clickhouse
      - hyperdx_ch_logs:/var/log/clickhouse-server
    # Wait until both the UI and the OTLP ingestor are actually accepting
    # connections before declaring the service healthy. ClickHouse can take
    # up to ~60 s on first boot which is why start_period is generous.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null 2>&1 && wget -q --spider http://localhost:4318/ > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  postgres_data:
  pgadmin_data:
  hyperdx_data:
  hyperdx_ch_data:
  hyperdx_ch_logs:
