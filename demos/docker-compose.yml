services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo_db}
      POSTGRES_USER: ${POSTGRES_USER:-todo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-readonly-user.sql:/docker-entrypoint-initdb.d/init-readonly-user.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo_user} -d ${POSTGRES_DB:-todo_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5445:5432"

  backend:
    build:
      context: ..
      dockerfile: demos/todo-backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      clickstack:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-todo_db}
      DB_USER: ${POSTGRES_USER:-todo_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-todo_secret}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min32chars!}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PORT: 3000
      NODE_ENV: production
      OTEL_SERVICE_NAME: todo-backend
      OTEL_EXPORTER_OTLP_ENDPOINT: http://clickstack:4318
      OTEL_LOG_LEVEL: warn
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: demos/todo-frontend/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_API_URL: ""
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    environment:
      URL: http://localhost:${APP_PORT:-3000}/openapi.json
      DISPLAY_OPERATION_ID: "true"
    ports:
      - "${SWAGGER_PORT:-8090}:8080"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@todo.local.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "8110:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro

  # ClickStack — all-in-one OTel collector + ClickHouse + HyperDX UI + MongoDB.
  # UI:        http://localhost:${CLICKSTACK_PORT:-8091}
  # OTLP HTTP: http://clickstack:4318 (in-network) | http://localhost:4318 (host)
  #
  # Uses the `clickstack-local` image which runs in no-auth local mode out of
  # the box — no user account needed. DEFAULT_CONNECTIONS and DEFAULT_SOURCES
  # seed the ClickHouse connection and all four OTel sources (Logs, Traces,
  # Metrics, Sessions) automatically on first boot, so `docker compose up`
  # gives a fully configured UI with zero manual steps.
  #
  # NOTE: the host port MUST match the container port — the UI generates
  # self-referential URLs using its internal port. We override the internal
  # port via HYPERDX_APP_PORT so they always agree, freeing host port 8080.
  clickstack:
    image: clickhouse/clickstack-local:latest
    restart: unless-stopped
    environment:
      HYPERDX_APP_PORT: ${CLICKSTACK_PORT:-8091}
      # Pre-seed the local ClickHouse connection (host is localhost because
      # ClickHouse runs inside the same container as HyperDX).
      DEFAULT_CONNECTIONS: '[{"name":"Local ClickHouse","host":"http://localhost:8123","username":"default","password":""}]'
      # Pre-seed all four OTel sources so Logs/Traces/Metrics/Sessions appear
      # in the UI immediately without any manual configuration.
      # Column names match the standard OTel ClickHouse exporter schema.
      DEFAULT_SOURCES: '[{"from":{"databaseName":"default","tableName":"otel_logs"},"kind":"log","timestampValueExpression":"TimestampTime","name":"Logs","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"Body","serviceNameExpression":"ServiceName","bodyExpression":"Body","eventAttributesExpression":"LogAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,SeverityText,Body","severityTextExpression":"SeverityText","traceIdExpression":"TraceId","spanIdExpression":"SpanId","connection":"Local ClickHouse","traceSourceId":"Traces","metricSourceId":"Metrics"},{"from":{"databaseName":"default","tableName":"otel_traces"},"kind":"trace","timestampValueExpression":"Timestamp","name":"Traces","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"SpanName","serviceNameExpression":"ServiceName","eventAttributesExpression":"SpanAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,StatusCode,round(Duration/1e6),SpanName","traceIdExpression":"TraceId","spanIdExpression":"SpanId","durationExpression":"Duration","durationPrecision":9,"parentSpanIdExpression":"ParentSpanId","spanNameExpression":"SpanName","spanKindExpression":"SpanKind","statusCodeExpression":"StatusCode","statusMessageExpression":"StatusMessage","connection":"Local ClickHouse","logSourceId":"Logs","metricSourceId":"Metrics"},{"from":{"databaseName":"default","tableName":""},"kind":"metric","timestampValueExpression":"TimeUnix","name":"Metrics","resourceAttributesExpression":"ResourceAttributes","metricTables":{"gauge":"otel_metrics_gauge","histogram":"otel_metrics_histogram","sum":"otel_metrics_sum"},"connection":"Local ClickHouse","logSourceId":"Logs","traceSourceId":"Traces"},{"from":{"databaseName":"default","tableName":"hyperdx_sessions"},"kind":"session","timestampValueExpression":"TimestampTime","name":"Sessions","displayedTimestampValueExpression":"Timestamp","implicitColumnExpression":"Body","serviceNameExpression":"ServiceName","bodyExpression":"Body","eventAttributesExpression":"LogAttributes","resourceAttributesExpression":"ResourceAttributes","defaultTableSelectExpression":"Timestamp,ServiceName,SeverityText,Body","severityTextExpression":"SeverityText","traceIdExpression":"TraceId","spanIdExpression":"SpanId","connection":"Local ClickHouse","logSourceId":"Logs","traceSourceId":"Traces"}]'
    ports:
      - "${CLICKSTACK_PORT:-8091}:${CLICKSTACK_PORT:-8091}"
      - "4317:4317"   # OTLP/gRPC
      - "4318:4318"   # OTLP/HTTP
      - "8123:8123"   # ClickHouse HTTP (debug)
    volumes:
      - clickstack_data:/data/db
      - clickstack_ch_data:/var/lib/clickhouse
      - clickstack_ch_logs:/var/log/clickhouse-server
    # Wait until the UI is accepting TCP connections before declaring the
    # service healthy. Uses bash's built-in /dev/tcp (no `nc` / `wget`
    # required). The OTel collector (4318) is launched by opampsupervisor
    # after the API configures it — the backend SDK retries until it's ready,
    # so we don't need to gate on it here.
    # ClickHouse can take up to ~60 s on first boot.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/${CLICKSTACK_PORT:-8091}'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  postgres_data:
  pgadmin_data:
  clickstack_data:
  clickstack_ch_data:
  clickstack_ch_logs:
