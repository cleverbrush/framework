services:
  schema-website:
    build:
      context: .
      dockerfile: websites/schema/Dockerfile
    ports:
      - "127.0.0.1:3100:3000"
    restart: unless-stopped

  docs-website:
    build:
      context: .
      dockerfile: websites/docs/Dockerfile
    ports:
      - "127.0.0.1:3101:3000"
    restart: unless-stopped
