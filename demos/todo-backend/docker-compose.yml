services:
  postgres:
    image: postgres:17-alpine
    container_name: todo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-todo_db}
      POSTGRES_USER: ${DB_USER:-todo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-todo_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-todo_user} -d ${DB_NAME:-todo_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-todo_db}
      DB_USER: ${DB_USER:-todo_user}
      DB_PASSWORD: ${DB_PASSWORD:-todo_secret}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (minimum 32 characters)}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: todo-swagger-ui
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      API_URL: http://localhost:${APP_PORT:-3000}/openapi.json
    ports:
      - "8090:8080"

volumes:
  postgres_data:
    driver: local
